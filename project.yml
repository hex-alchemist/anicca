name: Anicca
options:
  bundleIdPrefix: com.screensagestudios
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  postGenCommand: ""

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  Anicca:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Anicca
        excludes:
          - "Resources/SupabaseSetup.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screensagestudios.anicca
        PRODUCT_NAME: Anicca
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Anicca/Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: GoogleSignIn
        product: GoogleSignIn
      - sdk: AuthenticationServices.framework
      - sdk: StoreKit.framework
      - sdk: SafariServices.framework
      - sdk: UserNotifications.framework
      - sdk: PDFKit.framework
